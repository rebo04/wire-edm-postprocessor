name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # also lets you trigger manually from GitHub UI

jobs:

  # ── Windows .exe ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller ezdxf

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed `
            --name "WireEDM_PostProcessor" `
            app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WireEDM_PostProcessor_Windows
          path: dist/WireEDM_PostProcessor.exe

  # ── macOS .app ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller ezdxf

      - name: Build .app
        run: |
          pyinstaller --windowed \
            --name "WireEDM_PostProcessor" \
            app.py
          cd dist && zip -r WireEDM_PostProcessor_macOS.zip WireEDM_PostProcessor.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WireEDM_PostProcessor_macOS
          path: dist/WireEDM_PostProcessor_macOS.zip

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WireEDM_PostProcessor_Windows/WireEDM_PostProcessor.exe
            WireEDM_PostProcessor_macOS/WireEDM_PostProcessor_macOS.zip
          body: |
            ## Wire EDM Post-Processor — ${{ github.ref_name }}

            ### Download & Run (no Python needed)
            | Platform | File | Instructions |
            |----------|------|-------------|
            | **Windows** | `WireEDM_PostProcessor.exe` | Download → double-click |
            | **macOS**   | `WireEDM_PostProcessor_macOS.zip` | Download → unzip → right-click the app → Open |

            > **macOS note:** First time only — right-click the `.app` and choose **Open** (macOS blocks unsigned apps on first launch, this bypasses it).
